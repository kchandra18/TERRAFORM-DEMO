name: Terraform CI/CD Pipeline

on:
  push:
    branches:
      - main        # Runs when code is pushed to main branch
  pull_request:
    branches:
      - main        # Runs when PR is created to main

jobs:
  terraform:
    name: Terraform Workflow
    runs-on: ubuntu-latest   # Uses a Linux runner

    env:
      AWS_REGION: us-east-1  # Change to your AWS region

    steps:
      # Step 1: Checkout code from GitHub repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Step 3: Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 4: Initialize Terraform
      - name: Terraform Init
        run: terraform init

      # Step 5: Validate Terraform code
      - name: Terraform Validate
        run: terraform validate

      # Step 6: Terraform Plan
      - name: Terraform Plan
        run: terraform plan -out=tfplan

      # Step 7: Terraform Apply (only on main branch)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

